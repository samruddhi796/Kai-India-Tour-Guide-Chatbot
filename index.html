<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kai - Smart Travel Assistant</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:,">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body>

<div class="chat-container">

    <div class="chat-header">
        <i class="fas fa-globe-americas"></i> Kai - Smart Travel Assistant
    </div>

    <!-- ✅ ONLY ONE chatBox -->
    <div class="chat-box" id="chatBox">
        <div class="message bot">
            <i class="fas fa-plane"></i> Hey! I'm Kai <br>
            Let's plan your perfect trip! 😊
        </div>
    </div>

    <!-- Quick replies -->
    <div class="quick-replies" id="quickReplies"></div>

    <!-- Input -->
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type or speak...">
        <button onclick="startVoice()" class="mic-btn" title="Voice Input"><i class="fas fa-microphone"></i></button>
        <button onclick="sendMessage()" class="send-btn"><i class="fas fa-paper-plane"></i></button>
    </div>

    <!-- Restart button -->
    <button onclick="resetChat()" class="reset-btn"><i class="fas fa-redo"></i> Restart</button>

</div>

<script src="script.js"></script>

</body>
</html>
